name: Update manifest

on:
  push:
    branches:
      - master
    paths:
      - 'cs/**'
      - 'en/**'
      - 'assets/**'
  workflow_dispatch:
    inputs:
      allow_same_version_changes:
        description: 'Allow same-version manifest regeneration for an intentional reset'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  update-manifest:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate manifest
        run: |
          args=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.allow_same_version_changes }}" = "true" ]; then
            args="--allow-same-version-changes"
          fi
          python3 scripts/generate_manifest.py $args

      - name: Commit generated manifest
        run: |
          if git diff --quiet -- manifest.json; then
            echo "manifest.json is unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Update content manifest"
          git push

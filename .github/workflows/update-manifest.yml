name: Update manifest

on:
  push:
    branches:
      - master
    paths:
      - 'cs/**'
      - 'en/**'
      - 'assets/**'
      - 'content_config.json'
      - 'scripts/generate_manifest.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-manifest:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate manifest
        run: python3 scripts/generate_manifest.py

      - name: Commit generated manifest
        run: |
          if [ -z "$(git status --porcelain -- cs en manifest.json manifest_index.json releases)" ]; then
            echo "generated content manifest files are unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cs en manifest.json manifest_index.json releases
          git commit -m "Update content manifest"
          git push
